site_name: Subtomo

theme:
  name: material
  search: true
  # These palette options allow for light and dark modes
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  # These features enable copy buttons on code blocks and add prev/next nav buttons
  features:
    - content.code.copy
    - navigation.footer


nav:
- index.md
- reading.md
- team.md
- Tutorial:
  - Introduction: hiv/index.md
  - Setup: hiv/setup.md
  - Initializing a TOMOMAN Project and Importing Data: hiv/import.md
  - Aligning Frames and Making Stacks: hiv/motioncor.md
  - Removing Bad Tilt Images: hiv/clean_stacks.md
  - Dose Filtering Stacks: hiv/dose_filter.md
  - Tilt-Series Alignment: hiv/align.md
  - Tilted CTF estimation: hiv/ctf_estimation.md
  - 3D CTF-Corrected Tomogram Reconstruction: hiv/novactf_recon.md
  - Reconstuct Tomogram with a SIRT-like Filter: hiv/sirtlike_recons.md
  - Particle Picking: hiv/picking.md
  - Initializing a STOPGAP folder for Bin 8 Averaging: hiv/bin8_init.md
  - Extracting Subtomograms: hiv/bin8_extract.md
  - Generating an Initial Average: hiv/bin8_init_avg.md
  - Translational Alignment: hiv/bin8_align1.md
  - Orientational Alignment: hiv/bin8_align2.md
  - Removing Overlapping and Bad Particles: hiv/bin8_clean.md
  - Aligning the Full Dataset: hiv/bin8_full.md
  - Bin 4 Subtomogram Averaging: hiv/bin4.md

